<svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Outer ring -->
  <circle cx="12" cy="12" r="10" fill="#3a3a3a"/>
  <!-- Clock face -->
  <circle cx="12" cy="12" r="8.5" fill="#222222"/>
  <!-- Tick marks at 12/3/6/9 -->
  <line x1="12" y1="4" x2="12" y2="5.5" stroke="#606060" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="12" y1="18.5" x2="12" y2="20" stroke="#606060" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="4" y1="12" x2="5.5" y2="12" stroke="#606060" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="18.5" y1="12" x2="20" y2="12" stroke="#606060" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Hour hand (up) — currentColor so active=lime, inactive=gray -->
  <line x1="12" y1="12" x2="12" y2="7" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
  <!-- Minute hand (~2 o'clock) -->
  <line x1="12" y1="12" x2="16.5" y2="14" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
  <!-- Center dot -->
  <circle cx="12" cy="12" r="1.2" fill="currentColor"/>
</svg>
